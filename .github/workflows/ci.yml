name: CI Pipeline

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  quality-checks:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pylint black flake8 mypy

      - name: Run Pylint checks
        run: |
          pylint backend/app --fail-under=8.0

      - name: Run Black code formatter check
        run: |
          black --check backend/app

      - name: Run Flake8 linting
        run: |
          flake8 backend/app --max-line-length=100 --count --statistics

      - name: Run MyPy type checking
        run: |
          mypy backend/app --ignore-missing-imports

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run unit tests with coverage
        run: |
          pytest backend/tests/ -v --cov=backend/app --cov-report=xml --cov-report=html --cov-report=term-missing

      - name: Check code coverage threshold (80%)
        run: |
          coverage report --fail-under=80

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Archive coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/

  security-checks:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bandit safety
          pip install -r backend/requirements.txt

      - name: Run Bandit security checks
        run: |
          bandit -r backend/app -f json -o bandit-report.json

      - name: Run Safety vulnerability check
        run: |
          safety check --json || true

  all-checks-passed:
    needs: [quality-checks, unit-tests, security-checks]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check if all checks passed
        run: |
          if [[ "${{ needs.quality-checks.result }}" == "failure" || "${{ needs.unit-tests.result }}" == "failure" || "${{ needs.security-checks.result }}" == "failure" ]]; then
            echo "❌ CI Pipeline Failed - Some checks did not pass"
            exit 1
          else
            echo "✅ CI Pipeline Passed - All checks successful"
          fi
