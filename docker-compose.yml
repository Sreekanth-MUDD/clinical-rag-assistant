version: '3.8'

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sanofi_admin
      POSTGRES_PASSWORD: sanofi_secure_pass123
      POSTGRES_DB: rag_clinical_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
